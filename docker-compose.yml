version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      # If running against a local cluster (e.g. kind/minikube) outside docker,
      # the backend might run in "mock mode" unless we mount ~/.kube/config
      # Uncomment to use real cluster config:
      KUBECONFIG: "/root/.kube/config"
    volumes:
      - ~/.kube:/root/.kube:ro
    networks:
      - deployboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Internally inside docker network
        NEXT_PUBLIC_API_URL: http://backend:8000
        # Client-side WS URL (must resolve from user's browser)
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8000"
    depends_on:
      - backend
    networks:
      - deployboard-network

networks:
  deployboard-network:
    driver: bridge
