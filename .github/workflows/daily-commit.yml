name: Daily Commit

on:
  schedule:
    # Every day at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update activity file
        run: |
          echo "$(date -u)" >> activity.log

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "goodonessck@gmail.com"

          git add activity.log

          git diff --cached --quiet && exit 0

          git commit -m "chore: daily activity"
          git push
